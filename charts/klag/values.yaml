# Default values for klag.
# This is a YAML-formatted file.

# Number of replicas. NOTE: klag has no leader election. Each replica independently
# polls Kafka and reports the same metrics. With push reporters (datadog/otlp) more than
# one replica double-reports (and double-bills); with prometheus it produces duplicate
# series differing only by pod. Keep at 1 unless you deduplicate downstream.
replicaCount: 1

image:
  repository: themoah/klag
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Klag never talks to the Kubernetes API, so the chart skips mounting the API token.
  # Set to true if you attach IRSA/workload-identity annotations that need the projected token.
  automount: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

# Secure-by-default pod/container security contexts. UID 65532 matches the non-root user
# baked into both the JVM and native (distroless :nonroot) images. readOnlyRootFilesystem
# works because the chart always mounts an emptyDir at /tmp (JVM + Netty need it).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8888

# Kafka connection configuration
kafka:
  # Kafka bootstrap servers (comma-separated list)
  bootstrapServers: "localhost:9092"
  # Admin client request timeout in milliseconds
  requestTimeoutMs: 30000
  # Security protocol: PLAINTEXT, SSL, SASL_PLAINTEXT, SASL_SSL
  securityProtocol: ""
  # SASL mechanism: PLAIN, SCRAM-SHA-256, SCRAM-SHA-512
  saslMechanism: ""
  # JAAS configuration string for SASL authentication
  # Example: org.apache.kafka.common.security.plain.PlainLoginModule required username="user" password="pass";
  saslJaasConfig: ""
  # Path to the SSL truststore file inside the container. When set, the chart emits
  # KAFKA_SSL_TRUSTSTORE_LOCATION so the AdminClient can verify broker certs.
  # Typically combined with extraVolumes/extraVolumeMounts to mount a secret or PVC
  # carrying the JKS/PKCS12 truststore.
  sslTruststoreLocation: ""
  # Password for the truststore above. Stored in the chart-managed Kafka secret and
  # injected as KAFKA_SSL_TRUSTSTORE_PASSWORD via secretKeyRef. When using existingSecret,
  # put the password under secretKeys.truststorePassword in that secret and set any
  # non-empty placeholder here to enable the env var.
  sslTruststorePassword: ""
  # Use an existing secret for Kafka credentials instead of creating one
  existingSecret: ""
  # Keys in the existing secret
  secretKeys:
    jaasConfig: "jaas-config"
    truststorePassword: "truststore-password"

# Metrics configuration
metrics:
  # Metrics reporter: none, prometheus, datadog, otlp
  reporter: "prometheus"
  # Metrics collection interval in milliseconds
  intervalMs: 60000
  # Comma-separated glob patterns for consumer groups to include (e.g., "app-*", "ingest*,categorize*")
  groupFilter: "*"
  # Comma-separated glob patterns for consumer groups to exclude (e.g., "debug-*,canary-*,*-shadow"); evaluated after groupFilter
  groupExclude: ""
  # Enable JVM metrics (memory, GC, threads, CPU)
  jvmEnabled: false

  # OTLP (OpenTelemetry) configuration - used when reporter is "otlp"
  otlp:
    # OTLP endpoint URL (e.g., http://localhost:4318/v1/metrics)
    endpoint: ""
    # Authentication headers (format: key1=value1,key2=value2)
    # Example for Grafana Cloud: Authorization=Basic <base64-credentials>
    headers: ""
    # Service name for OTEL_SERVICE_NAME
    serviceName: "klag"
    # Additional resource attributes (format: key1=value1,key2=value2)
    resourceAttributes: ""
    # OTLP export interval in milliseconds (maps to OTLP_STEP_MS env var).
    # Leave empty to fall back to OTEL_METRIC_EXPORT_INTERVAL or the app default (60000).
    stepMs: ""
    # Use an existing secret for OTLP headers
    existingSecret: ""
    secretKeys:
      headers: "otlp-headers"

  # Datadog configuration - used when reporter is "datadog"
  datadog:
    # Datadog API key (required for Datadog reporter)
    apiKey: ""
    # Datadog application key (required for Datadog reporter)
    appKey: ""
    # Datadog site: datadoghq.com, datadoghq.eu, etc.
    site: "datadoghq.com"
    # Use an existing secret for Datadog credentials
    existingSecret: ""
    secretKeys:
      apiKey: "api-key"
      appKey: "app-key"

# Application configuration
app:
  # Kafka health check interval in milliseconds
  healthCheckIntervalMs: 30000
  # Enable Java 21 virtual threads (experimental)
  useVirtualThreads: false

# MCP endpoint for AI agents (read-only; see docs). Disabled by default.
mcp:
  enabled: false
  # HTTP path of the MCP endpoint
  path: "/mcp"
  # Bearer token required on every MCP request. Stored in a chart-managed Secret and
  # injected as MCP_AUTH_TOKEN via secretKeyRef. Empty = unauthenticated (klag logs a warning).
  authToken: ""
  # Use an existing secret for the MCP token instead of creating one
  existingSecret: ""
  secretKeys:
    authToken: "mcp-auth-token"

# Logging configuration
logging:
  # Root logger level
  level: "INFO"
  # Klag module logger level (leave empty to use root level)
  levelKlag: ""
  # Kafka client logger level
  levelKafka: ""
  # Health check logger level
  levelHealth: ""
  # Metrics collector logger level
  levelMetrics: ""

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

nodeSelector: {}

tolerations: []

affinity: {}

# Additional volumes to attach to the pod (e.g., truststore PVC, certs ConfigMap).
# Example:
#   - name: shared-certificates
#     persistentVolumeClaim:
#       claimName: shared-certificates-volume-claim
extraVolumes: []

# Additional volume mounts for the klag container. Pair with extraVolumes.
# Example:
#   - name: shared-certificates
#     mountPath: /etc/shared-certificates
#     readOnly: true
extraVolumeMounts: []

# Additional environment variables for the klag container (verbatim EnvVar entries).
# Escape hatch for settings without first-class values: HOT_PARTITION_*, TIME_LAG_*,
# KAFKA_CHUNK_*, LAG_TREND_DEADBAND_MSG_PER_SEC, KLAG_CONFIG_FILE, LOG_LEVEL_KAFKA_CLIENT, ...
# Example:
#   - name: KAFKA_CHUNK_COUNT
#     value: "4"
#   - name: SOME_SECRET
#     valueFrom:
#       secretKeyRef:
#         name: my-secret
#         key: my-key
extraEnv: []

# Additional envFrom sources (ConfigMaps/Secrets) for the klag container.
# Example:
#   - secretRef:
#       name: my-kafka-env
extraEnvFrom: []

# Optional NetworkPolicy restricting ingress to the metrics/health/MCP port.
networkPolicy:
  enabled: false
  # Peers allowed to reach the http port (NetworkPolicyPeer entries). Empty list = allow
  # from anywhere (still restricted to the http port only).
  # Example:
  #   - namespaceSelector:
  #       matchLabels:
  #         kubernetes.io/metadata.name: monitoring
  ingressFrom: []

# Prometheus ServiceMonitor configuration
serviceMonitor:
  # Enable ServiceMonitor for Prometheus Operator
  enabled: false
  # Namespace for the ServiceMonitor (defaults to release namespace)
  namespace: ""
  # Scrape interval
  interval: 30s
  # Scrape timeout
  scrapeTimeout: 10s
  # Additional labels for the ServiceMonitor
  labels: {}
