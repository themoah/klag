name: Release

on:
  push:
    # chart-releaser tags the chart as klag-<version>; plain semver tags are
    # also supported. Any tag triggers a build of the matching image.
    tags:
      - 'klag-*'
      - '[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.8). If empty, reads from build.gradle.kts'
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: gradle test

      - name: Extract version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            # Strip any tag prefix (klag-, v, ...) leaving the bare semver.
            VERSION="${GITHUB_REF_NAME##*-}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(grep -oP 'version\s*=\s*"\K[^"]+' build.gradle.kts)
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      - name: Build fat JAR
        run: gradle shadowJar

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            themoah/klag:${{ steps.version.outputs.version }}
            themoah/klag:latest
            ghcr.io/themoah/klag:${{ steps.version.outputs.version }}
            ghcr.io/themoah/klag:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Klag v${{ steps.version.outputs.version }}
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: build/libs/klag-${{ steps.version.outputs.version }}-fat.jar
