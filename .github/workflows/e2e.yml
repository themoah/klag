name: E2E (Helm + k3d)

# Runs the full end-to-end tests: builds the Klag image, spins up a k3d cluster
# with a real Kafka, installs the Helm chart, generates consumer lag, and
# asserts Klag scrapes and exposes it. Two jobs:
#   * e2e      - plain apache/kafka broker, matrixed across Kafka versions
#   * strimzi  - Kafka provisioned by the Strimzi operator, matrixed across the
#                Kafka versions Strimzi supports (verifies chart/Strimzi compat)

on:
  pull_request:
    paths:
      - 'charts/**'
      - 'src/**'
      - 'Dockerfile'
      - 'build.gradle.kts'
      - 'scripts/e2e-test.sh'
      - 'scripts/e2e-strimzi-test.sh'
      - '.github/workflows/e2e.yml'
  push:
    branches: [main]
    paths:
      - 'charts/**'
      - 'src/**'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kafka: ['3.7.0', '3.8.0', '3.9.0']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
      - name: Install k3d
        env:
          K3D_VERSION: v5.7.5
          K3D_SHA256: 5d3f22817d9e163ab6ed43572189dd49fe724d7a6948075b570067747eca8d3f
        run: |
          curl -fsSL -o /tmp/k3d \
            "https://github.com/k3d-io/k3d/releases/download/${K3D_VERSION}/k3d-linux-amd64"
          echo "${K3D_SHA256}  /tmp/k3d" | sha256sum -c -
          chmod +x /tmp/k3d
          sudo mv /tmp/k3d /usr/local/bin/k3d
          k3d version
      - name: Run e2e test (Kafka ${{ matrix.kafka }})
        env:
          KAFKA_IMAGE: apache/kafka:${{ matrix.kafka }}
        run: ./scripts/e2e-test.sh

  strimzi:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kafka: ['3.7.0', '4.2.0']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
      - name: Install k3d
        env:
          K3D_VERSION: v5.7.5
          K3D_SHA256: 5d3f22817d9e163ab6ed43572189dd49fe724d7a6948075b570067747eca8d3f
        run: |
          curl -fsSL -o /tmp/k3d \
            "https://github.com/k3d-io/k3d/releases/download/${K3D_VERSION}/k3d-linux-amd64"
          echo "${K3D_SHA256}  /tmp/k3d" | sha256sum -c -
          chmod +x /tmp/k3d
          sudo mv /tmp/k3d /usr/local/bin/k3d
          k3d version
      - name: Run Strimzi e2e (Kafka ${{ matrix.kafka }})
        env:
          KAFKA_VERSION: ${{ matrix.kafka }}
        run: ./scripts/e2e-strimzi-test.sh
