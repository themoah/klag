name: E2E Strimzi (Helm + k3d)

# Strimzi compatibility end-to-end test: provisions Kafka via the Strimzi
# operator (KRaft) in a k3d cluster, installs the Klag Helm chart pointed at the
# Strimzi bootstrap service, generates lag, and asserts Klag scrapes it.
# Matrixed across the Kafka versions Strimzi supports.
#
# Triggers only on changes that can affect this test: app code, the chart, the
# Strimzi e2e script, or this workflow.

on:
  pull_request:
    paths:
      - 'charts/**'
      - 'src/**'
      - 'Dockerfile'
      - 'build.gradle.kts'
      - 'scripts/e2e-strimzi-test.sh'
      - '.github/workflows/e2e-strimzi.yml'
  push:
    branches: [main]
    paths:
      - 'charts/**'
      - 'src/**'
      - 'Dockerfile'
      - 'build.gradle.kts'
      - 'scripts/e2e-strimzi-test.sh'
      - '.github/workflows/e2e-strimzi.yml'
  workflow_dispatch:

jobs:
  strimzi:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kafka: ['4.1.0', '4.2.0']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
      - name: Install k3d
        env:
          K3D_VERSION: v5.7.5
          K3D_SHA256: 5d3f22817d9e163ab6ed43572189dd49fe724d7a6948075b570067747eca8d3f
        run: |
          curl -fsSL -o /tmp/k3d \
            "https://github.com/k3d-io/k3d/releases/download/${K3D_VERSION}/k3d-linux-amd64"
          echo "${K3D_SHA256}  /tmp/k3d" | sha256sum -c -
          chmod +x /tmp/k3d
          sudo mv /tmp/k3d /usr/local/bin/k3d
          k3d version
      - name: Run Strimzi e2e (Kafka ${{ matrix.kafka }})
        env:
          KAFKA_VERSION: ${{ matrix.kafka }}
        run: ./scripts/e2e-strimzi-test.sh
