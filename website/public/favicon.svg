<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="7" fill="#0d9488"/>
  <!-- rising bars = throughput, trailing gap = lag -->
  <g fill="#ffffff">
    <rect x="6"  y="20" width="4" height="6"  rx="1"/>
    <rect x="12" y="15" width="4" height="11" rx="1"/>
    <rect x="18" y="10" width="4" height="16" rx="1"/>
  </g>
  <!-- lag marker -->
  <rect x="24" y="6" width="3" height="20" rx="1.5" fill="#f59e0b"/>
</svg>
